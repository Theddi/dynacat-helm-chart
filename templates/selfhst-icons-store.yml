{{- if .Values.selfhstIcons.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dynacat.icons.fullname" . }}
  labels:
    {{- include "dynacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: selfhst-icons
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.selfhstIcons.pvc.sizeRequest }}
  {{- with .Values.selfhstIcons.pvc.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "dynacat.icons.fullname" . }}-init
  labels:
    {{- include "dynacat.labels" . | nindent 4 }}
    app.kubernetes.io/component: selfhst-icons
  annotations:
    # Re-runs on every install/upgrade; the script itself decides whether a
    # refresh is needed (see selfhstIcons.refreshOnUpgrade).
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: selfhst-icons
    spec:
      restartPolicy: OnFailure
      containers:
        - name: fetch-icons
          image: {{ .Values.selfhstIcons.initImage }}
          command:
            - sh
            - -ec
            - |
              layout="{{ ternary "flat" "by-ext" .Values.selfhstIcons.dynacatInternal }}"
              {{- if not .Values.selfhstIcons.refreshOnUpgrade }}
              if [ "$(cat /icons/.layout 2>/dev/null || true)" = "$layout" ]; then
                echo "Icons already present in '$layout' layout, skipping."
                echo "Set selfhstIcons.refreshOnUpgrade=true to force a refresh."
                exit 0
              fi
              {{- end }}
              echo "Fetching selfh.st icons ({{ join ", " .Values.selfhstIcons.iconFileTypes }})..."
              git clone --depth 1 --filter=blob:none --sparse \
                {{ .Values.selfhstIcons.iconRepository }} /icons-repo
              git -C /icons-repo sparse-checkout set {{ join " " .Values.selfhstIcons.iconFileTypes }}
              # Clean slate so removed formats and layout switches leave no stale files
              find /icons -mindepth 1 -delete
              for ext in {{ join " " .Values.selfhstIcons.iconFileTypes }}; do
                [ -d "/icons-repo/$ext" ] || continue
              {{- if .Values.selfhstIcons.dynacatInternal }}
                # Flat layout, served by dynacat as /assets/icons/<name>.<ext>
                cp -r "/icons-repo/$ext/." /icons/
              {{- else }}
                # Per-format layout as expected by the selfh.st icons server
                mkdir -p "/icons/$ext"
                cp -r "/icons-repo/$ext/." "/icons/$ext/"
              {{- end }}
              done
              echo "$layout" > /icons/.layout
              echo "Done: $(find /icons -type f | wc -l) files."
          volumeMounts:
            - name: icons-data
              mountPath: /icons
      volumes:
        - name: icons-data
          persistentVolumeClaim:
            claimName: {{ include "dynacat.icons.fullname" . }}
{{- end }}
