apiVersion: v1
kind: Service
metadata:
  name: {{ include "dynacat.fullname" . }}
  labels:
    {{- include "dynacat.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "dynacat.selectorLabels" . | nindent 4 }}
