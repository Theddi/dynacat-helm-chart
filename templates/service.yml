---
kind: Service
apiVersion: v1
metadata:
  name: dynacat
  labels:
    app.kubernetes.io/instance: dynacat
    app.kubernetes.io/name: dynacat
spec:
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/instance: dynacat
    app.kubernetes.io/name: dynacat
{{- if and $.Values.selfhstIcons.enabled (not $.Values.selfhstIcons.dynacatInternal) }}
---
apiVersion: v1
kind: Service
metadata:
  name: selfhst-icons
spec:
  selector:
    app: selfhst-icons
  ports:
    - port: 80
      targetPort: 4050
      name: http
  type: ClusterIP
{{- end }}