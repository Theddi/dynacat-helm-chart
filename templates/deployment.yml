apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dynacat.fullname" . }}
  labels:
    {{- include "dynacat.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dynacat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dynacat.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dynacat
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ include "dynacat.port" . }}
              protocol: TCP
          {{- if or .Values.selfhstIcons.enabled .Values.extraEnv }}
          env:
            {{- if .Values.selfhstIcons.enabled }}
            - name: SH
              {{- if .Values.selfhstIcons.dynacatInternal }}
              value: /assets/icons/
              {{- else }}
              value: http://{{ include "dynacat.icons.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local/
              {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 2
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            # Guarantees assets-path exists and stays writable (dynacat's
            # db-path defaults to a file inside it)
            - name: assets
              mountPath: {{ include "dynacat.assetsPath" . }}
            {{- if .Values.css }}
            - name: config
              mountPath: {{ include "dynacat.assetsPath" . }}/user.css
              subPath: user.css
              readOnly: true
            {{- end }}
            {{- if and .Values.selfhstIcons.enabled .Values.selfhstIcons.dynacatInternal }}
            - name: icons-data
              mountPath: {{ include "dynacat.assetsPath" . }}/icons
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "dynacat.fullname" . }}-config
        - name: assets
          emptyDir: {}
        {{- if and .Values.selfhstIcons.enabled .Values.selfhstIcons.dynacatInternal }}
        - name: icons-data
          persistentVolumeClaim:
            claimName: {{ include "dynacat.icons.fullname" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
