apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dynacat.fullname" . }}-config
  labels:
    {{- include "dynacat.labels" . | nindent 4 }}
data:
  {{- with .Values.css }}
  user.css: |
    {{- . | nindent 4 }}
  {{- end }}
  dynacat.yml: |
    {{- $config := deepCopy (.Values.config | default dict) }}
    {{- if .Values.css }}
      {{- $theme := $config.theme | default dict }}
      {{- $_ := set $theme "custom-css-file" "/assets/user.css" }}
      {{- $_ := set $config "theme" $theme }}
    {{- end }}
    {{- range $section, $content := $config }}
    {{- if $content }}
    {{ $section }}:
      {{- $content | toYaml | nindent 6 }}
    {{- end }}
    {{- end }}
    {{- if .Values.pages }}
    pages:
    {{- range $name, $_ := .Values.pages }}
      - $include: {{ $name }}.yml
    {{- end }}
    {{- end }}
  {{- range $name, $content := .Values.pages }}
  {{ $name }}.yml: |
    {{- $content | required (printf "pages.%s must contain the page definition (name, columns, ...)" $name) | toYaml | nindent 4 }}
  {{- end }}
